; M5Stack Tab5 USB Mass Storage — Minimal Example
; https://github.com/yuleshow/M5Stack-Tab5-USB-MSC
;
; IMPORTANT: You must apply the framework patches before building.
;            See patches/README.md for instructions.

[env:m5stack-tab5]
platform = https://github.com/pioarduino/platform-espressif32.git#54.03.21
board = esp32-p4-evboard
framework = arduino
board_build.mcu = esp32p4
upload_speed = 1500000
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_FSLS_P4=1
    -DCFG_TUD_ENDOINT_SIZE=64
    -DCFG_TUD_ENDOINT0_SIZE=64
    -DCORE_DEBUG_LEVEL=4

lib_deps = 
    m5stack/M5Unified @ ^0.2.13
